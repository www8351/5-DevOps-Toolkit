name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PY_TARGETS: 04-network-ssh/ssh_toolkit 05-docker-devops/ec2-deploy.py

jobs:
  lint:
    name: py_compile + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Compile check
        run: python -m py_compile $(find 04-network-ssh/ssh_toolkit 05-docker-devops -name '*.py')

      - name: Ruff (real errors only)
        # E9 syntax, F63/F7 logic, F82 undefined names — not style. Keeps CI signal high.
        run: ruff check --select E9,F63,F7,F82 $PY_TARGETS

  pytest:
    name: pytest (ssh_toolkit utils)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest 04-network-ssh/tests -q
